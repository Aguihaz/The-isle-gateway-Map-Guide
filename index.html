<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gateway Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body { margin: 0; }
        #map { width: 100vw; height: 100vh; }

        /* botão abrir menu */
        .sidebar-button {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: #222;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 1000;
        }

        /* painel */
        .sidebar {
            position: absolute;
            left: 65px;
            top: 50%;
            transform: translateY(-50%) translateX(-30px);
            width: 260px;
            height: 50vh;
            background: rgba(20,20,20,0.92);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 15px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .sidebar.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) translateX(0);
        }

        /* botões do menu */
        .layer-button {
            width: 100%;
            height: 45px;
            margin-bottom: 10px;
            background: #333;
            border-radius: 8px;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 16px;
        }

        .layer-button:hover { background: #444; }

        /* Caixa de Busca de Coordenadas (Estilo Vulnona) */
        .search-box {
            position: absolute;
            left: 20px;
            bottom: 20px;
            z-index: 1000;
            background: rgba(20,20,20,0.9);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .search-box h4 { margin: 0 0 8px 0; font-size: 14px; color: #bbb; }
        .search-box input { width: 200px; height: 30px; background: #333; color: white; border: 1px solid #555; padding: 0 8px; border-radius: 4px; }
        .search-box button { height: 32px; cursor: pointer; background: #007acc; color: white; border: none; padding: 0 12px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .search-box button:hover { background: #0098ff; }
    </style>
</head>

<body>

    <div id="map"></div>

    <div class="search-box">
        <h4>Buscar Coordenada do Jogo</h4>
        <input id="game-coords-input" placeholder="Cole aqui: Y, X, Z">
        <button onclick="buscarCoordenada()">Ir</button>
    </div>

    <button class="sidebar-button" onclick="toggleMenu()">☰</button>

    <div class="sidebar" id="menu">
        <button class="layer-button" onclick="toggleWater()">💧 Water</button>
        <button class="layer-button">🛣️ Roads</button>
        <button class="layer-button">🕳️ Caves</button>
        <button class="layer-button">🍖 Food</button>
        <button class="layer-button">📍 Locations</button>
        <button class="layer-button">🟢 Migration Zones</button>
        <button class="layer-button">🔴 Patrol Zones</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const bounds = [[0, 0], [2160, 2160]];

        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1.5,
            maxZoom: 4,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            zoomAnimation: true,
            zoomSnap: 0.25,
            wheelPxPerZoomLevel: 120
        });

        // Mapa base
        const image = "images/gatewaymapHT.png";
        L.imageOverlay(image, bounds).addTo(map);

        // Camada de água (inicia desativada)
        const waterLayer = L.imageOverlay("images/watermap.png", bounds);

        map.fitBounds(bounds);

        // Abrir/Fechar menu lateral
        function toggleMenu(){
            document.getElementById("menu").classList.toggle("active");
        }

        // Liga/Desliga camada de água
        function toggleWater(){
            if(map.hasLayer(waterLayer)){
                map.removeLayer(waterLayer);
            } else {
                waterLayer.addTo(map);
            }
        }

        // ========================================================
        // 🛠️ CALIBRAÇÃO MANUAL AJUSTADA (ESTILO VULNONA)
        // ========================================================
        
        // Multiplicador de escala corrigido para o tamanho do mapa do Evrima
        // Se notar que o ponto andou demais ou de menos, a gente mexe aqui:
        const multiplicadorX = -1.85; 
        const multiplicadorY = -2.15; 

        // Ponto central da imagem (2160 / 2 = 1080) mapeado para o centro do mapa (0,0)
        const centroPixelX = 1080;
        const centroPixelY = 1080;

        // Converte recebendo a ordem exata do jogo: Y, X
        function converterJogoParaMapa(jogoY, jogoX) {
            // No The Isle, o X do jogo mexe na horizontal (Lng)
            const lng = centroPixelX + (jogoX * multiplicadorX);
            
            // O Y do jogo mexe na vertical (Lat)
            const lat = centroPixelY + (jogoY * multiplicadorY);
            
            return [lat, lng];
        }

        let marcadorBusca = null;

        function spawnMarcador(jogoY, jogoX, texto) {
            const pos = converterJogoParaMapa(jogoY, jogoX);
            
            if (marcadorBusca) {
                map.removeLayer(marcadorBusca);
            }

            marcadorBusca = L.marker(pos).addTo(map).bindPopup(texto).openPopup();
            map.setView(pos, 2); 
        }

        // Função chamada pelo botão "Ir"
        function buscarCoordenada() {
            const inputVal = document.getElementById("game-coords-input").value.trim();
            if (!inputVal) return;

            // Limpa vírgulas e separa por espaços
            const numeros = inputVal.replace(/,/g, ' ').split(/\s+/).map(Number).filter(n => !isNaN(n));

            // Lê na ordem exata que você usa: Y, X, Z
            if (numeros.length >= 2) {
                const jogoY = numeros[0]; // Primeiro número é o Y
                const jogoX = numeros[1]; // Segundo número é o X
                
                spawnMarcador(jogoY, jogoX, `Localização encontrada!<br><b>Y:</b> ${jogoY}<br><b>X:</b> ${jogoX}`);
            } else {
                alert("Cole a coordenada inteira (Exemplo: -98, -114, 0)");
            }
        }
    </script>

</body>
</html>
