<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gateway Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link class="styles" rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body { margin: 0; background: #111; }
        
        #map { 
            width: 100vw; 
            height: 100vh; 
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
        }

        /* Estilo base unificado cinza escuro com borda branca fina */
        .custom-ui-style {
            background: #222 !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            border-radius: 8px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6) !important;
            font-family: sans-serif;
        }

        /* Customização dos botões nativos de Zoom (+ e -) do Leaflet */
        .leaflet-control-zoom a {
            background: #222 !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            border-radius: 6px !important;
            transition: background 0.2s;
        }
        .leaflet-control-zoom a:hover {
            background: #333 !important;
        }
        .leaflet-bar {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6) !important;
        }

        /* Caixa de Busca de Coordenadas posicionada no canto inferior esquerdo */
        .search-box {
            position: absolute;
            left: 20px;
            bottom: 20px;
            z-index: 1000;
            padding: 15px;
            width: 260px;
            box-sizing: border-box;
        }
        .search-box h4 { margin: 0 0 8px 0; font-size: 14px; color: #bbb; }
        
        .search-box-row {
            display: flex;
            gap: 6px;
        }
        .search-box input { 
            flex: 1;
            height: 32px; 
            background: #333; 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 0 8px; 
            border-radius: 6px; 
        }
        .search-box button { 
            height: 34px; 
            cursor: pointer; 
            background: #444; 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 0 14px; 
            border-radius: 6px; 
            font-weight: bold; 
        }
        .search-box button:hover { background: #555; }

        /* Botão abrir menu posicionado exatamente acima da caixa de busca */
        .sidebar-button {
            position: absolute;
            left: 20px;
            bottom: 125px; /* Alinhado logo acima do Search Box */
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 1000;
            transition: background 0.2s;
        }
        .sidebar-button:hover { background: #333 !important; }

        /* Aba Lateral abrindo verticalmente para cima */
        .sidebar {
            position: absolute;
            left: 20px;
            bottom: 180px; /* Abre logo acima do botão de hambúrguer */
            width: 260px;
            max-height: 50vh;
            overflow-y: auto;
            padding: 12px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transform: translateY(15px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            box-sizing: border-box;
        }
        .sidebar.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* Botões internos das camadas */
        .layer-button {
            width: 100%;
            height: 40px;
            margin-bottom: 8px;
            background: #333;
            border-radius: 6px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            padding-left: 10px;
        }
        .layer-button:hover { background: #444; }
        .layer-button:last-child { margin-bottom: 0; }
    </style>
</head>

<body>

    <div id="map"></div>

    <div class="search-box custom-ui-style">
        <h4>Buscar Coordenada do Jogo</h4>
        <div class="search-box-row">
            <input id="game-coords-input" placeholder="Y, X, Z">
            <button onclick="buscarCoordenada()">Ir</button>
        </div>
    </div>

    <button class="sidebar-button custom-ui-style" onclick="toggleMenu()">☰</button>

    <div class="sidebar custom-ui-style" id="menu">
        <button class="layer-button" onclick="toggleLayer('water')">💧 Water</button>
        <button class="layer-button" onclick="toggleLayer('roads')">🛣️ Roads</button>
        <button class="layer-button" onclick="toggleLayer('migrations')">🟢 Migration Zones</button>
        <button class="layer-button" onclick="toggleLayer('patrol')">🔴 Patrol Zones</button>
        <button class="layer-button" onclick="toggleLayer('locations')">📍 Locations</button>
        <button class="layer-button">🕳️ Caves</button>
        <button class="layer-button">🍖 Food</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Tamanho do plano de pixels do Leaflet
        const bounds = [[0, 0], [2160, 2160]];

        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1.5,
            maxZoom: 4,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            zoomAnimation: true,
            zoomSnap: 0.25,
            wheelPxPerZoomLevel: 120
        });

        const image = "images/gatewaymapHT.png";
        L.imageOverlay(image, bounds).addTo(map);

        // ========================================================
        // 🧱 GERENCIAMENTO DE CAMADAS E ORDEM VISUAL (Z-INDEX)
        // ========================================================

        map.createPane('waterPane').style.zIndex = 401;
        map.createPane('roadsPane').style.zIndex = 402;
        map.createPane('migrationsPane').style.zIndex = 403;
        map.createPane('patrolPane').style.zIndex = 404;
        map.createPane('locationsPane').style.zIndex = 405;

        const layers = {
            water: L.imageOverlay("images/watermap.png", bounds, { pane: 'waterPane' }),
            roads: L.imageOverlay("images/Roads.png", bounds, { pane: 'roadsPane' }),
            migrations: L.imageOverlay("images/MigrationsZones.png", bounds, { pane: 'migrationsPane' }),
            patrol: L.imageOverlay("images/PatrolZones.png", bounds, { pane: 'patrolPane' }),
            locations: L.imageOverlay("images/Locations.png", bounds, { pane: 'locationsPane' })
        };

        map.fitBounds(bounds);

        function toggleMenu(){
            document.getElementById("menu").classList.toggle("active");
        }

        function toggleLayer(layerName) {
            const targetLayer = layers[layerName];
            if (!targetLayer) return;

            if (map.hasLayer(targetLayer)) {
                map.removeLayer(targetLayer);
            } else {
                targetLayer.addTo(map);
            }
        }

        // ========================================================
        // 🛠️ NOVO SISTEMA DE CONVERSÃO BASEADO EM LIMITES (ESTILO VULNONA)
        // ========================================================

        // Altere esses limites chutando os valores do jogo até bater certinho com o mapa!
        const LIMITES_JOGO = {
            minX: -200, // Limite oeste (esquerda) do jogo
            maxX: 300,  // Limite leste (direita) do jogo
            minY: -300, // Limite sul (geralmente baixo) do jogo
            maxY: 200   // Limite norte (geralmente cima) do jogo
        };

        function converterJogoParaMapa(jogoY, jogoX) {
            // Calcula a porcentagem de onde o ponto está no mapa do jogo (de 0 a 1)
            const pctX = (jogoX - LIMITES_JOGO.minX) / (LIMITES_JOGO.maxX - LIMITES_JOGO.minX);
            const pctY = (jogoY - LIMITES_JOGO.minY) / (LIMITES_JOGO.maxY - LIMITES_JOGO.minY);

            // Mapeia essa porcentagem direto nos limites de pixels (0 a 2160)
            const lng = bounds[0][1] + pctX * (bounds[1][1] - bounds[0][1]);
            
            // Inversão do eixo Y clássica de motores de jogos para planos cartesianos simples
            const lat = bounds[1][0] - pctY * (bounds[1][0] - bounds[0][0]);

            return [lat, lng];
        }

        let marcadorBusca = null;

        function spawnMarcador(jogoY, jogoX, texto) {
            const pos = converterJogoParaMapa(jogoY, jogoX);
            
            if (marcadorBusca) {
                map.removeLayer(marcadorBusca);
            }

            marcadorBusca = L.marker(pos).addTo(map).bindPopup(texto).openPopup();
            map.setView(pos, 2); 
        }

        function buscarCoordenada() {
            const inputVal = document.getElementById("game-coords-input").value.trim();
            if (!inputVal) return;

            // Divide a string por espaços ou vírgulas
            const numeros = inputVal.replace(/,/g, ' ').split(/\s+/).map(Number).filter(n => !isNaN(n));

            // Lê na ordem padrão colada: Y, X, Z (onde o Z será ignorado)
            if (numeros.length >= 2) {
                const jogoY = numeros[0]; 
                const jogoX = numeros[1]; 
                
                spawnMarcador(jogoY, jogoX, `Localização encontrada!<br><b>Y:</b> ${jogoY}<br><b>X:</b> ${jogoX}`);
            } else {
                alert("Cole a coordenada inteira (Exemplo: -98, -114, 0)");
            }
        }
    </script>

</body>
</html>
