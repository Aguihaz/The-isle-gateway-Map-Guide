<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gateway Map</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet (biblioteca do mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // cria mapa
const bounds = [[0,0], [2160,2160]];

const map = L.map('map', {
    crs: L.CRS.Simple,

    minZoom: -1,
    maxZoom: 4,

    maxBounds: bounds,
    maxBoundsViscosity: 1.0,

    zoomAnimation: true,
    zoomSnap: 0.25,
    wheelPxPerZoomLevel: 120
});


const image = "images/gatewaymapHT.png";

L.imageOverlay(image, bounds).addTo(map);


map.fitBounds(bounds);

</script>

</body>
</html>
