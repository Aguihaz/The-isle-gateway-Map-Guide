<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gateway Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body { margin: 0; }
        #map { width: 100vw; height: 100vh; }

        /* botão abrir menu */
        .sidebar-button {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: #222;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 1000;
        }

        /* painel */
        .sidebar {
            position: absolute;
            left: 65px;
            top: 50%;
            transform: translateY(-50%) translateX(-30px);
            width: 260px;
            height: 50vh;
            background: rgba(20,20,20,0.92);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 15px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .sidebar.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) translateX(0);
        }

        /* botões */
        .layer-button {
            width: 100%;
            height: 45px;
            margin-bottom: 10px;
            background: #333;
            border-radius: 8px;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 16px;
        }

        .layer-button:hover { background: #444; }
    </style>
</head>

<body>

    <div id="map"></div>

    <button class="sidebar-button" onclick="toggleMenu()">☰</button>

    <div class="sidebar" id="menu">
        <button class="layer-button" onclick="toggleWater()">💧 Water</button>
        <button class="layer-button">🛣️ Roads</button>
        <button class="layer-button">🕳️ Caves</button>
        <button class="layer-button">🍖 Food</button>
        <button class="layer-button">📍 Locations</button>
        <button class="layer-button">🟢 Migration Zones</button>
        <button class="layer-button">🔴 Patrol Zones</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const bounds = [[0, 0], [2160, 2160]];

        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1.5,
            maxZoom: 4,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            zoomAnimation: true,
            zoomSnap: 0.25,
            wheelPxPerZoomLevel: 120
        });

        // mapa base
        const image = "images/gatewaymapHT.png";
        L.imageOverlay(image, bounds).addTo(map);

        // camada agua (começa desligada)
        const waterLayer = L.imageOverlay("images/watermap.png", bounds);

        map.fitBounds(bounds);

        // abrir menu
        function toggleMenu(){
            document.getElementById("menu").classList.toggle("active");
        }

        // liga/desliga agua
        function toggleWater(){
            if(map.hasLayer(waterLayer)){
                map.removeLayer(waterLayer);
            } else {
                waterLayer.addTo(map);
            }
        }

        // ========================================================
        // 🛠️ CONFIGURAÇÃO DA CALIBRAÇÃO (DAQUI PRA BAIXO)
        // ========================================================

        // PASSO 1: Troque estes valores de exemplo pelos seus dados reais do jogo!
        const jogoA = { x: -2000, y: -2000 };     // Coordenada no jogo (Ponto 1)
        const pixelA = { lng: 100, lat: 100 };    // Pixel no mapa (Ponto 1)

        const jogoB = { x: 2000, y: 2000 };       // Coordenada no jogo (Ponto 2)
        const pixelB = { lng: 2000, lat: 2000 };  // Pixel no mapa (Ponto 2)

        // Cálculo da proporção
        const escalaX = (pixelB.lng - pixelA.lng) / (jogoB.x - jogoA.x);
        const escalaY = (pixelB.lat - pixelA.lat) / (jogoB.y - jogoA.y);

        // Função mágica de conversão
        function converterJogoParaMapa(jogoX, jogoY) {
            const lng = pixelA.lng + (jogoX - jogoA.x) * escalaX;
            const lat = pixelA.lat + (jogoY - jogoA.y) * escalaY;
            return [lat, lng];
        }

        // Função para criar o marcador usando dados do jogo
        function spawnMarcador(jogoX, jogoY, texto) {
            const pos = converterJogoParaMapa(jogoX, jogoY);
            L.marker(pos).addTo(map).bindPopup(texto);
        }

        // PASSO 3: Adicione seus marcadores aqui
        // Exemplo: spawnMarcador(-98, -114, "Minha Localização");


        // ⚙️ FERRAMENTA AUXILIAR: Clique no mapa para ver o Pixel
        map.on("click", function(e) {
            alert("Pixel -> lng: " + Math.round(e.latlng.lng) + ", lat: " + Math.round(e.latlng.lat));
        });
    </script>

</body>
</html>
